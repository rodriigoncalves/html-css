<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de texto</title>
</head>
<body>
    <h1>principais fiormatações</h1>
    <h2>Negrito / Destaque</h2>
    <p>Nesta frase tenho um termo <strong>em destaque</strong> usando a tag STRONG (Semântica)</p>
    <h2>Itálico / Enfase</h2>
    <p>Nesta frase temos um <i>termo em itálico</i> usanda a tag I (não Semântica)</p>
    <p>Nesta frase temos um <em>termo em itálico</em> usanda a tag I (Semântica)</p>
</body>
</html>
